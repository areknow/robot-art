[build]
  buildCommand = "npx nx build api --prod"
  watchPatterns = [
    "apps/api/**",
    "libs/api-interfaces/**",
    "workspace.json",
    "nx.json",
    "tsconfig.base.json",
    "package.json",
    "package-lock.json"
  ]

[deploy]
  startCommand = "node dist/apps/api/main.js"
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3
